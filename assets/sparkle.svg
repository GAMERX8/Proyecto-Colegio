<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer border stroke to make it look like a sticker -->
  <path d="M 50 5 L 62 38 L 95 50 L 62 62 L 50 95 L 38 62 L 5 50 L 38 38 Z" 
        fill="#FFFFFF" stroke="#333333" stroke-width="8" stroke-linejoin="round"/>
  <!-- Shiny golden yellow body -->
  <path d="M 50 10 L 60 40 L 90 50 L 60 60 L 50 90 L 40 60 L 10 50 L 40 40 Z" 
        fill="#FFE259"/>
  <!-- Highlight inner part -->
  <path d="M 50 20 L 55 45 L 80 50 L 55 55 L 50 80 L 45 55 L 20 50 L 45 45 Z" 
        fill="#FFF3B0"/>
  <!-- Sparkle dots -->
  <circle cx="50" cy="50" r="4" fill="#FFFFFF"/>
</svg>
